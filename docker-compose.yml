services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: med_rag_postgres
    environment:
      POSTGRES_USER: medrag
      POSTGRES_PASSWORD: medrag_secret
      POSTGRES_DB: med_rag_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrag -d med_rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
